name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --dev
      - run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --dev
      - run: uv run pytest

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy with Safe Backup
        run: |
          # Визначаємо шлях до робочої папки додатка
          APP_DIR="~/deploy_demo"
          mkdir -p $APP_DIR

          # РОБИМО БЕКАП старого конфігу, який ЗАРАЗ працює в APP_DIR
          if [ -f $APP_DIR/docker-compose.yml ]; then
            cp $APP_DIR/docker-compose.yml $APP_DIR/docker-compose.yml.bak
            echo "Backup created from existing production config."
          fi

          # КОПІЮЄМО новий конфіг з папки ранера в робочу папку
          cp docker-compose.yml $APP_DIR/docker-compose.yml

          # Всі подальші дії робимо в директорії $APP_DIR
          cd $APP_DIR
          
          # Оновлюємо тег образу в новому файлі (використовуємо SHA)
          sed -i "s|latest|sha-${{ github.sha }}|g" docker-compose.yml

          # Спроба деплою
          docker compose pull
          docker compose up -d

          # ПЕРЕВІРКА (Healthcheck)
          sleep 10
          if ! curl -s -f http://localhost:5000/health; then
            echo "Healthcheck failed! Triggering rollback..."
            
            # ВІДКАТ: Повертаємо бекап у робочу директорію
            mv docker-compose.yml.bak docker-compose.yml
            docker compose up -d
            echo "Rollback finished. Old version is back online."
            exit 1
          fi
          
          echo "Deployment successful!"
