version: '3.8'
services:
  app:
    image: ghcr.io/comsys-kpi-ua/deploy.demo.ci-cd:latest
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=${APP_VERSION:-3.0.0}
    volumes:
      - ./main.py:/app/crash.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
